function replaceColors(html, map) {
  if (!map) return html;
  let s = html;
  for (const [f, t] of Object.entries(map)) s = s.split(f).join(t);
  return s;
}

function buildCard(logo) {
  const card = document.createElement('div');
  card.className = 'combo-card';
  card.id = logo.id;

  // Combo display: variants strip
  const display = document.createElement('div');
  display.className = 'combo-display';
  const strip = document.createElement('div');
  strip.className = 'variant-strip';

  for (const p of PALETTES) {
    const variant = document.createElement('div');
    variant.className = 'variant';

    const box = document.createElement('div');
    box.className = 'variant-box';

    // SVG
    const svgWrap = document.createElement('div');
    svgWrap.innerHTML = replaceColors(logo.svg, p.colors);
    box.appendChild(svgWrap);

    // Service name
    const nameEl = document.createElement('div');
    nameEl.className = 'variant-service-name';
    nameEl.style.color = p.nameColor;
    nameEl.textContent = 'サイトマイスター';
    box.appendChild(nameEl);

    // Tagline
    const taglineEl = document.createElement('div');
    taglineEl.className = 'variant-tagline';
    taglineEl.style.color = p.tagColor;
    taglineEl.textContent = logo.tagline;
    box.appendChild(taglineEl);

    const label = document.createElement('span');
    label.className = 'v-label';
    label.textContent = p.label;

    variant.appendChild(box);
    variant.appendChild(label);
    strip.appendChild(variant);
  }

  display.appendChild(strip);

  // Meta
  const meta = document.createElement('div');
  meta.className = 'combo-meta';
  meta.innerHTML = `
    <h5>${logo.id} ｜ ${logo.name}</h5>
    <p>${logo.desc}</p>
    <div class="tags">${logo.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
  `;

  card.appendChild(display);
  card.appendChild(meta);
  return card;
}

document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('grid-meister');
  for (const logo of LOGOS) {
    grid.appendChild(buildCard(logo));
  }
});
