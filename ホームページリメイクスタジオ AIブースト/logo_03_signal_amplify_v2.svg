<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Signal/WiFi style amplification -->
  <g transform="translate(90, 115)">
    <!-- Three arcs getting bigger (signal boost) -->
    <path d="M -16 0 Q -16 -22 0 -22 Q 16 -22 16 0" fill="none" stroke="#00C9A7" stroke-width="4" stroke-linecap="round"/>
    <path d="M -30 0 Q -30 -44 0 -44 Q 30 -44 30 0" fill="none" stroke="#0D4F38" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M -46 0 Q -46 -68 0 -68 Q 46 -68 46 0" fill="none" stroke="#0D4F38" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <!-- Center base dot -->
    <circle cx="0" cy="0" r="6" fill="#0D4F38"/>
    <!-- Upward bar from base -->
    <line x1="0" y1="-6" x2="0" y2="-16" stroke="#0D4F38" stroke-width="3" stroke-linecap="round"/>
    <!-- Ascending stars/sparks -->
    <circle cx="36" cy="-55" r="3" fill="#00C9A7" opacity="0.7"/>
    <circle cx="-36" cy="-55" r="2" fill="#00C9A7" opacity="0.5"/>
  </g>

  <!-- Logotype -->
  <!-- Dual accent line -->
  <rect x="158" y="128" width="190" height="1.5" fill="#E5E7EB" rx="1"/>
  <rect x="158" y="128" width="50" height="1.5" fill="#00C9A7" rx="1"/>

  <!-- v3: ホームページリメイクスタジオ大・ブランド名小 -->
  <text x="158.0" y="78" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="20" font-weight="800" fill="#6B7280" letter-spacing="0.5">ホームページ</text>
  <text x="158.0" y="102" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="20" font-weight="800" fill="#6B7280" letter-spacing="0.5">リメイクスタジオ</text>
  <text x="158.0" y="120" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#0D4F38" letter-spacing="2">AIブースト</text>
</svg>
