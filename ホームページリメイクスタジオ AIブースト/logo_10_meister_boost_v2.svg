<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <linearGradient id="meisterBoost" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D4F38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A8A6A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Shield / quality mark with upward arrow -->
  <g transform="translate(90, 100)">
    <!-- Shield shape -->
    <path d="M 0 -50 L 38 -30 L 38 10 Q 38 42 0 52 Q -38 42 -38 10 L -38 -30 Z" fill="url(#meisterBoost)"/>
    <!-- Inner shield -->
    <path d="M 0 -40 L 28 -24 L 28 10 Q 28 34 0 42 Q -28 34 -28 10 L -28 -24 Z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- Upward arrow inside shield -->
    <line x1="0" y1="20" x2="0" y2="-18" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <polygon points="0,-26 -12,-10 12,-10" fill="white"/>
    <!-- Speed lines next to arrow inside -->
    <line x1="-16" y1="-4" x2="-8" y2="-4" stroke="#00C9A7" stroke-width="2" stroke-linecap="round"/>
    <line x1="-16" y1="4" x2="-8" y2="4" stroke="#00C9A7" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="8" y1="-4" x2="16" y2="-4" stroke="#00C9A7" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="4" x2="16" y2="4" stroke="#00C9A7" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Vertical divider line -->
  <line x1="158" y1="35" x2="158" y2="165" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Logotype -->
  <text x="172" y="72" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10.5" fill="#6B7280" letter-spacing="2">ホームページリメイクスタジオ</text>
  <text x="172" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#0D4F38">AIブースト</text>
  <!-- Meister quality badge -->
  <rect x="172" y="126" width="105" height="18" rx="3" fill="url(#meisterBoost)"/>
  <text x="224" y="139" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle" letter-spacing="1.5">AI MEISTER</text>
  <text x="172" y="163" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10" fill="#9CA3AF">品質保証・信頼の職人AIサービス</text>
</svg>
