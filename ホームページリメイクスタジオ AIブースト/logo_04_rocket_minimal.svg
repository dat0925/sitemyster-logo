<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00C9A7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D4F38;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Minimal rocket -->
  <g transform="translate(90, 100)">
    <!-- Rocket body -->
    <path d="M 0 -52 Q 18 -40 18 -8 L 18 16 Q 0 20 -18 16 L -18 -8 Q -18 -40 0 -52 Z" fill="url(#rocketGrad)"/>
    <!-- Rocket nose highlight -->
    <path d="M 0 -52 Q 8 -42 8 -20 L 0 -20 Z" fill="white" opacity="0.2"/>
    <!-- Fins -->
    <path d="M -18 8 Q -36 20 -32 34 L -18 24" fill="#0D4F38"/>
    <path d="M 18 8 Q 36 20 32 34 L 18 24" fill="#0D4F38"/>
    <!-- Window -->
    <circle cx="0" cy="-18" r="8" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="0" cy="-18" r="4" fill="white" opacity="0.4"/>
    <!-- Flame -->
    <path d="M -10 28 Q 0 46 10 28" fill="url(#flameGrad)"/>
    <path d="M -6 28 Q 0 40 6 28" fill="#FF6B35" opacity="0.8"/>
  </g>

  <!-- Logotype -->
  <text x="162" y="72" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10.5" fill="#6B7280" letter-spacing="2">ホームページリメイクスタジオ</text>
  <!-- Bold type with colored "AI" -->
  <text x="162" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="800" fill="#00C9A7">AI</text>
  <text x="207" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="800" fill="#0D4F38">ブースト</text>
  <text x="162" y="148" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10" fill="#9CA3AF">他社からの乗り換えにも最適</text>
  <!-- Orange accent pill -->
  <rect x="162" y="155" width="55" height="15" rx="7.5" fill="#FF6B35" opacity="0.9"/>
  <text x="189" y="167" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">BOOST UP</text>
</svg>
