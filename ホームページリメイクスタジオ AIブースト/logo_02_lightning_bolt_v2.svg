<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00C9A7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D4F38;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Lightning bolt in a circle -->
  <g transform="translate(90, 100)">
    <!-- Circle background -->
    <circle cx="0" cy="0" r="50" fill="#0D4F38"/>
    <!-- Inner lighter circle -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Lightning bolt -->
    <polygon points="8,-40 -14,4 4,4 -8,40 20,-6 0,-6 16,-40" fill="#00C9A7"/>
    <!-- Highlight on bolt -->
    <polygon points="8,-40 0,-16 6,-16 -2,4 4,4 -8,40 20,-6 0,-6 16,-40" fill="white" opacity="0.15"/>
  </g>

  <!-- Logotype -->
  <text x="162" y="72" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10.5" fill="#6B7280" letter-spacing="2">ホームページリメイクスタジオ</text>
  <text x="162" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="800" fill="#0D4F38">AIブースト</text>
  <text x="162" y="148" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10" fill="#9CA3AF">AI Boost — 既存サイトを最適化・加速</text>
  <!-- Tag -->
  <rect x="162" y="155" width="62" height="16" rx="8" fill="#0D4F38"/>
  <text x="193" y="167" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle" letter-spacing="1">REPLACE</text>
</svg>
