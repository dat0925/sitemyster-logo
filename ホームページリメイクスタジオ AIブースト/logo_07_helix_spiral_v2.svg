<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Upward spiral/helix = growth energy -->
  <g transform="translate(90, 100)">
    <!-- Spiral path going upward -->
    <path d="M 0 40 Q 36 34 36 16 Q 36 -4 14 -8 Q -8 -12 -12 -26 Q -16 -40 0 -46 Q 18 -52 28 -44" fill="none" stroke="#0D4F38" stroke-width="4" stroke-linecap="round"/>
    <!-- Arrow tip at top of spiral -->
    <polygon points="28,-44 38,-52 24,-56" fill="#0D4F38"/>
    <!-- Accent dots along spiral path -->
    <circle cx="36" cy="16" r="5" fill="#00C9A7"/>
    <circle cx="-12" cy="-26" r="4" fill="#00C9A7" opacity="0.6"/>
    <circle cx="0" cy="40" r="6" fill="#0D4F38" opacity="0.3"/>
  </g>

  <!-- Logotype -->

  <!-- Subtle wave line -->
  <path d="M 158 128 Q 178 124 198 128 Q 218 132 238 128 Q 258 124 278 128" fill="none" stroke="#00C9A7" stroke-width="1.5" stroke-linecap="round"/>

  <!-- v3: ホームページリメイクスタジオ大・ブランド名小 -->
  <text x="158.0" y="88" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="24" font-weight="800" fill="#6B7280" letter-spacing="0.5">ホームページリメイクスタジオ</text>
  <text x="158.0" y="120" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#0D4F38" letter-spacing="2">AIブースト</text>
</svg>
