<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <linearGradient id="boostGrad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D4F38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C9A7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="speedLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C9A7;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#00C9A7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Bold upward arrow with speed lines -->
  <g transform="translate(90, 108)">
    <!-- Speed lines (fading left) -->
    <line x1="-50" y1="10" x2="-8" y2="10" stroke="url(#speedLine)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-38" y1="0" x2="-8" y2="0" stroke="url(#speedLine)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-45" y1="20" x2="-8" y2="20" stroke="url(#speedLine)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="-30" y1="-10" x2="-8" y2="-10" stroke="url(#speedLine)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Main upward arrow body -->
    <rect x="-10" y="-60" width="20" height="70" rx="4" fill="url(#boostGrad1)"/>
    <!-- Arrow head -->
    <polygon points="-26,-56 0,-88 26,-56" fill="url(#boostGrad1)"/>
    <!-- Accent highlight on arrow -->
    <rect x="-2" y="-60" width="6" height="70" rx="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Logotype -->
  <text x="158" y="72" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10.5" fill="#6B7280" letter-spacing="2">ホームページリメイクスタジオ</text>
  <text x="158" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="800" fill="#0D4F38">AIブースト</text>
  <!-- Accent underline (gradient) -->
  <defs>
    <linearGradient id="underGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C9A7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="158" y="124" width="160" height="3" fill="url(#underGrad)" rx="1.5"/>
  <text x="158" y="150" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10" fill="#9CA3AF">そのホームページ、AIで成果を加速させる</text>
</svg>
