<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Pulse/heartbeat line going upward -->
  <g transform="translate(90, 110)">
    <!-- Flat line before boost -->
    <line x1="-55" y1="0" x2="-28" y2="0" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Boost pulse -->
    <polyline points="-28,0 -18,0 -12,-20 -4,-56 4,-28 12,-48 20,-8 28,0" fill="none" stroke="#0D4F38" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Post-boost line (stronger) -->
    <line x1="28" y1="0" x2="55" y2="0" stroke="#00C9A7" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Peak dot -->
    <circle cx="-4" cy="-56" r="5" fill="#00C9A7"/>
    <!-- Ground line -->
    <line x1="-55" y1="4" x2="55" y2="4" stroke="#F3F4F6" stroke-width="1.5"/>
  </g>

  <!-- Logotype -->
  <!-- Dual color accent -->
  <rect x="162" y="125" width="80" height="2.5" fill="#0D4F38" rx="1.25"/>
  <rect x="244" y="125" width="40" height="2.5" fill="#00C9A7" rx="1.25"/>

  <!-- v3: ホームページリメイクスタジオ大・ブランド名小 -->
  <text x="162.0" y="78" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="20" font-weight="800" fill="#6B7280" letter-spacing="0.5">ホームページ</text>
  <text x="162.0" y="102" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="20" font-weight="800" fill="#6B7280" letter-spacing="0.5">リメイクスタジオ</text>
  <text x="162.0" y="120" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#0D4F38" letter-spacing="2">AIブースト</text>
</svg>
