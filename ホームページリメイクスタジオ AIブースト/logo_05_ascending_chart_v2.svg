<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Ascending bar chart / growth -->
  <g transform="translate(90, 110)">
    <!-- Bar 1 (shortest) -->
    <rect x="-50" y="-24" width="18" height="24" rx="3" fill="#0D4F38" opacity="0.3"/>
    <!-- Bar 2 -->
    <rect x="-28" y="-40" width="18" height="40" rx="3" fill="#0D4F38" opacity="0.5"/>
    <!-- Bar 3 -->
    <rect x="-6" y="-58" width="18" height="58" rx="3" fill="#0D4F38" opacity="0.75"/>
    <!-- Bar 4 (tallest - teal accent) -->
    <rect x="16" y="-80" width="18" height="80" rx="3" fill="#00C9A7"/>
    <!-- Arrow tip above tallest bar -->
    <polygon points="25,-84 30,-96 35,-84" fill="#00C9A7"/>
    <!-- Ground line -->
    <line x1="-56" y1="2" x2="44" y2="2" stroke="#E5E7EB" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Logotype -->
  <!-- Progress bar style decoration -->
  <rect x="158" y="126" width="200" height="4" rx="2" fill="#F3F4F6"/>
  <rect x="158" y="126" width="140" height="4" rx="2" fill="#00C9A7"/>

  <!-- v3: ホームページリメイクスタジオ大・ブランド名小 -->
  <text x="158.0" y="94" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="20" font-weight="800" fill="#6B7280" letter-spacing="0.5">ホームページリメイクスタジオ</text>
  <text x="158.0" y="120" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#0D4F38" letter-spacing="2">AIブースト</text>
</svg>
