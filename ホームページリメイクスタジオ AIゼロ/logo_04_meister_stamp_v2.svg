<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Craftsman badge / meister seal -->
  <g transform="translate(90, 100)">
    <!-- Outer decorative ring -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#0D4F38" stroke-width="2.5"/>
    <!-- Star/badge notches -->
    <polygon points="0,-50 3,-44 8,-47 6,-41 11,-40 8,-35" fill="#0D4F38" opacity="0.15"/>
    <polygon points="0,-50 -3,-44 -8,-47 -6,-41 -11,-40 -8,-35" fill="#0D4F38" opacity="0.15"/>

    <!-- Badge shape (hexagon) -->
    <polygon points="0,-42 36,-21 36,21 0,42 -36,21 -36,-21" fill="#0D4F38"/>

    <!-- Inner white hexagon -->
    <polygon points="0,-34 29,-17 29,17 0,34 -29,17 -29,-17" fill="white"/>

    <!-- Z mark inside -->
    <text x="0" y="12" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="900" fill="#0D4F38" text-anchor="middle">Z</text>

    <!-- Accent dot top -->
    <circle cx="0" cy="-50" r="5" fill="#00C9A7"/>
    <!-- Small accent marks at 4 cardinal points outside hexagon -->
    <rect x="-2" y="-47" width="4" height="6" rx="2" fill="#00C9A7" opacity="0.6"/>
  </g>

  <!-- Vertical divider -->
  <line x1="158" y1="40" x2="158" y2="160" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Logotype -->
  <text x="172" y="76" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10.5" font-weight="400" fill="#6B7280" letter-spacing="2">ホームページリメイクスタジオ</text>
  <text x="172" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#0D4F38">AI ZERO</text>
  <!-- Meister label -->
  <rect x="172" y="130" width="90" height="18" rx="3" fill="#0D4F38"/>
  <text x="217" y="143" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle" letter-spacing="2">MEISTER</text>
</svg>
