<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Geometric bloom / expanding from center -->
  <g transform="translate(90, 100)">
    <!-- Outer squares rotated at different angles -->
    <rect x="-38" y="-38" width="76" height="76" rx="4" fill="none" stroke="#0D4F38" stroke-width="2" transform="rotate(0)"/>
    <rect x="-32" y="-32" width="64" height="64" rx="4" fill="none" stroke="#00C9A7" stroke-width="1.5" transform="rotate(22.5)"/>
    <rect x="-22" y="-22" width="44" height="44" rx="3" fill="#0D4F38" transform="rotate(45)"/>
    <!-- Inner bright square -->
    <rect x="-12" y="-12" width="24" height="24" rx="2" fill="#00C9A7" transform="rotate(45)"/>
    <!-- Center point -->
    <circle cx="0" cy="0" r="4" fill="white"/>
  </g>

  <!-- Logotype (dark background style variation) -->
  <rect x="148" y="0" width="332" height="200" fill="white"/>

  <text x="162" y="75" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#6B7280" letter-spacing="2">ホームページリメイクスタジオ</text>

  <!-- Brand name with mixed weight -->
  <text x="162" y="122" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="900" fill="#0D4F38">AI ZERO</text>

  <!-- Accent line with dots pattern -->
  <line x1="162" y1="130" x2="345" y2="130" stroke="#E5E7EB" stroke-width="1"/>
  <circle cx="162" cy="130" r="3" fill="#00C9A7"/>
  <circle cx="253" cy="130" r="2" fill="#0D4F38" opacity="0.4"/>
  <circle cx="345" cy="130" r="3" fill="#0D4F38"/>

  <text x="162" y="155" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10" fill="#9CA3AF">Homepage Remake Studio</text>
</svg>
