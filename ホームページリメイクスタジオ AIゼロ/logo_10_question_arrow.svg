<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Question mark → Arrow (input to output flow) -->
  <g transform="translate(90, 100)">
    <!-- Question mark shape (left side) -->
    <path d="M -28 -28 Q -28 -46 0 -46 Q 28 -46 28 -28 Q 28 -14 0 -8 L 0 4" fill="none" stroke="#0D4F38" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="14" r="4" fill="#0D4F38"/>

    <!-- Transition arrow -->
    <line x1="34" y1="-16" x2="46" y2="-16" stroke="#00C9A7" stroke-width="2" stroke-linecap="round"/>
    <polygon points="46,-20 54,-16 46,-12" fill="#00C9A7"/>

    <!-- Output: Simple webpage symbol (right side) -->
    <rect x="58" y="-44" width="38" height="50" rx="4" fill="none" stroke="#0D4F38" stroke-width="2.5"/>
    <!-- Browser dots -->
    <circle cx="65" cy="-36" r="2.5" fill="#00C9A7"/>
    <circle cx="73" cy="-36" r="2.5" fill="#0D4F38" opacity="0.4"/>
    <circle cx="81" cy="-36" r="2.5" fill="#0D4F38" opacity="0.4"/>
    <!-- Content lines -->
    <line x1="64" y1="-26" x2="90" y2="-26" stroke="#0D4F38" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="64" y1="-18" x2="86" y2="-18" stroke="#0D4F38" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="64" y1="-10" x2="90" y2="-10" stroke="#00C9A7" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Logotype -->
  <text x="158" y="72" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10.5" fill="#6B7280" letter-spacing="2">ホームページリメイクスタジオ</text>
  <text x="158" y="120" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#0D4F38">AI ZERO</text>
  <!-- Tag-like accent -->
  <rect x="158" y="128" width="48" height="16" rx="8" fill="#00C9A7"/>
  <text x="182" y="140" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">新規向け</text>
  <text x="213" y="140" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10" fill="#9CA3AF">  質問に答えるだけで完成</text>
</svg>
