<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Network nodes emerging from center point -->
  <g transform="translate(90, 100)">
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="38" y2="-30" stroke="#0D4F38" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="42" y2="0" stroke="#0D4F38" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="35" y2="32" stroke="#0D4F38" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-38" y2="-28" stroke="#00C9A7" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-42" y2="8" stroke="#00C9A7" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-20" y2="40" stroke="#0D4F38" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Secondary connections -->
    <line x1="38" y1="-30" x2="42" y2="0" stroke="#0D4F38" stroke-width="1" opacity="0.3"/>
    <line x1="-38" y1="-28" x2="-42" y2="8" stroke="#00C9A7" stroke-width="1" opacity="0.3"/>
    <!-- Outer nodes -->
    <circle cx="38" cy="-30" r="7" fill="#0D4F38"/>
    <circle cx="42" cy="0" r="9" fill="#0D4F38"/>
    <circle cx="35" cy="32" r="6" fill="#00C9A7"/>
    <circle cx="-38" cy="-28" r="8" fill="#00C9A7"/>
    <circle cx="-42" cy="8" r="6" fill="#0D4F38"/>
    <circle cx="-20" cy="40" r="5" fill="#0D4F38" opacity="0.5"/>
    <!-- Center origin node (larger) -->
    <circle cx="0" cy="0" r="12" fill="#0D4F38"/>
    <circle cx="0" cy="0" r="6" fill="#00C9A7"/>
    <circle cx="0" cy="0" r="2" fill="white"/>
  </g>

  <!-- Logotype -->

  <!-- AI in accent color, ZERO in brand color -->

  <!-- v3: ホームページリメイクスタジオ大・ブランド名小 -->
  <text x="160.0" y="88" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="24" font-weight="800" fill="#6B7280" letter-spacing="0.5">ホームページリメイクスタジオ</text>
  <text x="160.0" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#0D4F38" letter-spacing="2">AI ZERO</text>
</svg>
