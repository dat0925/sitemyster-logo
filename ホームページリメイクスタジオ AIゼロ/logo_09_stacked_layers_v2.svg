<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>

  <!-- Symbol: Stacked layers suggesting website building -->
  <g transform="translate(90, 100)">
    <!-- Bottom layer (widest) -->
    <rect x="-44" y="24" width="88" height="14" rx="4" fill="#0D4F38" opacity="0.25"/>
    <!-- Layer 3 -->
    <rect x="-36" y="8" width="72" height="14" rx="4" fill="#0D4F38" opacity="0.45"/>
    <!-- Layer 2 -->
    <rect x="-28" y="-8" width="56" height="14" rx="4" fill="#0D4F38" opacity="0.7"/>
    <!-- Layer 1 (top - teal accent) -->
    <rect x="-20" y="-24" width="40" height="14" rx="4" fill="#00C9A7"/>
    <!-- Origin dot at top -->
    <circle cx="0" cy="-38" r="5" fill="#0D4F38"/>
    <!-- Connecting line -->
    <line x1="0" y1="-33" x2="0" y2="-26" stroke="#0D4F38" stroke-width="1.5" stroke-dasharray="2 2"/>
  </g>

  <!-- Logotype -->
  <text x="158" y="70" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10.5" fill="#6B7280" letter-spacing="2">ホームページリメイクスタジオ</text>
  <text x="158" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#0D4F38">AI ZERO</text>
  <!-- Subtle description -->
  <text x="158" y="145" font-family="'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif" font-size="10" fill="#6B7280">AIが自動でWEBサイトを構築</text>
  <!-- Accent line -->
  <rect x="158" y="125" width="200" height="2" fill="#E5E7EB" rx="1"/>
  <rect x="158" y="125" width="60" height="2" fill="#00C9A7" rx="1"/>
</svg>
