<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Anchor shape -->
    <circle cx="0" cy="-32" r="12" fill="none" stroke="#1A3580" stroke-width="4"/>
    <circle cx="0" cy="-32" r="5" fill="#1A3580"/>
    <!-- Anchor shaft -->
    <line x1="0" y1="-20" x2="0" y2="30" stroke="#1A3580" stroke-width="4" stroke-linecap="round"/>
    <!-- Crossbar -->
    <line x1="-28" y1="-28" x2="28" y2="-28" stroke="#1A3580" stroke-width="4" stroke-linecap="round"/>
    <!-- Anchor flukes -->
    <path d="M 0 30 Q 30 30 30 18 Q 30 8 18 8" fill="none" stroke="#1A3580" stroke-width="4" stroke-linecap="round"/>
    <path d="M 0 30 Q -30 30 -30 18 Q -30 8 -18 8" fill="none" stroke="#1A3580" stroke-width="4" stroke-linecap="round"/>
    <!-- Teal accent ring around crossbar ends -->
    <circle cx="-28" cy="-28" r="5" fill="#2B5CE6"/>
    <circle cx="28" cy="-28" r="5" fill="#2B5CE6"/>
    <!-- Gold ring at top -->
    <circle cx="0" cy="-44" r="6" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
  </g>
  <text x="160" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6B7280" letter-spacing="3">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">揺るぎない信頼のAIホームページサービス</text>
</svg>
