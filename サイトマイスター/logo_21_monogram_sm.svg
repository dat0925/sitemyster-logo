<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Elegant SM monogram in circle -->
    <circle cx="0" cy="0" r="50" fill="#1A3580"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#2B5CE6" stroke-width="1" opacity="0.5"/>
    <!-- S letter -->
    <text x="-10" y="8" font-family="Georgia,'Times New Roman',serif" font-size="30" font-weight="700" fill="white" text-anchor="middle">S</text>
    <!-- M letter overlapping -->
    <text x="12" y="8" font-family="Georgia,'Times New Roman',serif" font-size="30" font-weight="700" fill="#60A5FA" text-anchor="middle" opacity="0.9">M</text>
    <!-- Gold ring accent -->
    <path d="M -20 -38 A 50 50 0 0 1 20 -38" fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="160" y="74" font-family="Georgia,'Times New Roman',serif" font-size="12" fill="#6B7280" letter-spacing="4">SITE MEISTER</text>
  <text x="160" y="118" font-family="Georgia,'Times New Roman',serif" font-size="32" font-weight="700" fill="#1A3580">サイトマイスター</text>
  <line x1="160" y1="128" x2="350" y2="128" stroke="#E5E7EB" stroke-width="1"/>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" fill="#9CA3AF" letter-spacing="2">AI HOMEPAGE CRAFTMANSHIP</text>
</svg>
