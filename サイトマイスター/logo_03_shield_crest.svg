<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <linearGradient id="shieldG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2B5CE6"/>
      <stop offset="100%" style="stop-color:#1A3580"/>
    </linearGradient>
  </defs>
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,102)">
    <path d="M 0 -52 L 42 -34 L 42 8 Q 42 46 0 58 Q -42 46 -42 8 L -42 -34 Z" fill="url(#shieldG)"/>
    <!-- Inner shield line -->
    <path d="M 0 -42 L 32 -28 L 32 8 Q 32 38 0 48 Q -32 38 -32 8 L -32 -28 Z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- "M" for Meister inside shield -->
    <text x="0" y="12" font-family="'Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle">M</text>
    <!-- Star on top of shield -->
    <polygon points="0,-58 3,-52 9,-52 5,-47 7,-41 0,-45 -7,-41 -5,-47 -9,-52 -3,-52" fill="#F59E0B"/>
  </g>
  <line x1="155" y1="35" x2="155" y2="165" stroke="#E5E7EB" stroke-width="1"/>
  <text x="170" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#60A5FA" letter-spacing="3">SITE MEISTER</text>
  <text x="170" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <rect x="170" y="126" width="110" height="16" rx="3" fill="#1A3580"/>
  <text x="225" y="138" font-family="'Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle" letter-spacing="2">直販チャネル</text>
</svg>
