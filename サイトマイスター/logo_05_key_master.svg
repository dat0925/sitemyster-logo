<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Key shape -->
    <circle cx="-10" cy="-12" r="26" fill="none" stroke="#1A3580" stroke-width="5"/>
    <circle cx="-10" cy="-12" r="14" fill="none" stroke="#60A5FA" stroke-width="2.5"/>
    <circle cx="-10" cy="-12" r="5" fill="#1A3580"/>
    <!-- Key shaft -->
    <rect x="10" y="-18" width="42" height="10" rx="5" fill="#1A3580"/>
    <!-- Key teeth -->
    <rect x="30" y="-8" width="8" height="10" rx="2" fill="#1A3580"/>
    <rect x="44" y="-8" width="8" height="8" rx="2" fill="#2B5CE6"/>
    <!-- Gold highlight on key head -->
