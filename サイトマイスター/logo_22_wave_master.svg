<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Three stacked waves suggesting mastery/control -->
    <path d="M -50 -20 Q -30 -36 0 -20 Q 30 -4 50 -20" fill="none" stroke="#1A3580" stroke-width="4" stroke-linecap="round"/>
    <path d="M -50 0 Q -30 -16 0 0 Q 30 16 50 0" fill="none" stroke="#2B5CE6" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M -50 20 Q -30 4 0 20 Q 30 36 50 20" fill="none" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Control point dot -->
