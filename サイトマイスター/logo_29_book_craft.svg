<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Open book shape -->
    <!-- Left page -->
    <path d="M 0 -40 Q -30 -44 -48 -36 L -48 38 Q -30 32 0 36 Z" fill="#1A3580"/>
    <!-- Right page -->
    <path d="M 0 -40 Q 30 -44 48 -36 L 48 38 Q 30 32 0 36 Z" fill="#2B5CE6"/>
    <!-- Book spine -->
    <rect x="-3" y="-40" width="6" height="76" rx="2" fill="#0A1430"/>
    <!-- Text lines on left page -->
    <line x1="-40" y1="-20" x2="-8" y2="-20" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-40" y1="-10" x2="-8" y2="-10" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-40" y1="0" x2="-8" y2="0" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-40" y1="10" x2="-8" y2="10" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- AI symbol on right page -->
    <text x="26" y="6" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">AI</text>
    <!-- Gold bookmark ribbon -->
    <polygon points="4,-40 10,-40 10,10 7,4 4,10" fill="#F59E0B"/>
  </g>
  <text x="160" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6B7280" letter-spacing="3">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">AIの知識を結集した職人のHP制作</text>
</svg>
