<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,108)">
    <!-- Lighthouse body -->
    <polygon points="-18,-60 18,-60 24,28 -24,28" fill="#1A3580"/>
    <!-- Stripes on lighthouse -->
    <rect x="-18" y="-40" width="36" height="10" fill="#60A5FA" opacity="0.4"/>
    <rect x="-18" y="-20" width="36" height="10" fill="#60A5FA" opacity="0.3"/>
    <!-- Lighthouse top room -->
    <rect x="-20" y="-68" width="40" height="12" rx="2" fill="#2B5CE6"/>
    <!-- Light bulb glow -->
    <circle cx="0" cy="-82" r="14" fill="#F59E0B" opacity="0.2"/>
    <circle cx="0" cy="-82" r="8" fill="#F59E0B" opacity="0.6"/>
    <circle cx="0" cy="-82" r="4" fill="#F59E0B"/>
    <!-- Light rays -->
    <line x1="10" y1="-84" x2="36" y2="-92" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="12" y1="-78" x2="40" y2="-78" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-10" y1="-84" x2="-36" y2="-92" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <!-- Base -->
    <rect x="-28" y="28" width="56" height="10" rx="4" fill="#1A3580" opacity="0.6"/>
    <!-- Water line -->
    <path d="M -50 36 Q -35 32 -20 36 Q -5 40 10 36 Q 25 32 40 36 Q 50 39 55 36" fill="none" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  <text x="160" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6B7280" letter-spacing="3">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">お客様のビジネスを照らす灯台のHP</text>
</svg>
