<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Camera lens / aperture -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="#1A3580" stroke-width="3"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#2B5CE6" stroke-width="2"/>
    <!-- Aperture blades -->
    <path d="M 0,-28 Q 10,-14 0,0 Q -10,-14 0,-28 Z" fill="#1A3580" opacity="0.7" transform="rotate(0)"/>
    <path d="M 0,-28 Q 10,-14 0,0 Q -10,-14 0,-28 Z" fill="#1A3580" opacity="0.7" transform="rotate(60)"/>
    <path d="M 0,-28 Q 10,-14 0,0 Q -10,-14 0,-28 Z" fill="#1A3580" opacity="0.7" transform="rotate(120)"/>
    <path d="M 0,-28 Q 10,-14 0,0 Q -10,-14 0,-28 Z" fill="#1A3580" opacity="0.7" transform="rotate(180)"/>
    <path d="M 0,-28 Q 10,-14 0,0 Q -10,-14 0,-28 Z" fill="#1A3580" opacity="0.7" transform="rotate(240)"/>
    <path d="M 0,-28 Q 10,-14 0,0 Q -10,-14 0,-28 Z" fill="#1A3580" opacity="0.7" transform="rotate(300)"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="14" fill="#1A3580"/>
    <circle cx="0" cy="0" r="8" fill="#60A5FA"/>
    <circle cx="0" cy="0" r="4" fill="white"/>
    <!-- Lens flare -->
    <circle cx="-10" cy="-12" r="4" fill="rgba(255,255,255,0.5)"/>
  </g>
  <text x="160" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6B7280" letter-spacing="3">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">焦点の合った、精密なHP制作</text>
</svg>
