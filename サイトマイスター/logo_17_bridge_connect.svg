<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,110)">
    <!-- Bridge arch -->
    <path d="M -50 20 Q -50 -40 0 -40 Q 50 -40 50 20" fill="none" stroke="#1A3580" stroke-width="5" stroke-linecap="round"/>
    <!-- Bridge road -->
    <line x1="-55" y1="20" x2="55" y2="20" stroke="#1A3580" stroke-width="5" stroke-linecap="round"/>
    <!-- Suspension cables -->
    <line x1="0" y1="-40" x2="-36" y2="20" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="-40" x2="36" y2="20" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="-40" x2="-18" y2="20" stroke="#60A5FA" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="-40" x2="18" y2="20" stroke="#60A5FA" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <!-- Towers -->
    <line x1="0" y1="-40" x2="0" y2="-56" stroke="#1A3580" stroke-width="5" stroke-linecap="round"/>
    <!-- Gold peak -->
    <circle cx="0" cy="-58" r="5" fill="#F59E0B"/>
  </g>
  <text x="160" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6B7280" letter-spacing="3">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">お客様とビジネスをつなぐ架け橋</text>
</svg>
