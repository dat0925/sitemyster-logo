<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <linearGradient id="sealG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B5CE6"/>
      <stop offset="100%" style="stop-color:#1A3580"/>
    </linearGradient>
  </defs>
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Sunburst rays behind seal -->
    <g opacity="0.15">
      <line x1="0" y1="-54" x2="0" y2="-44" stroke="#1A3580" stroke-width="3"/>
      <line x1="27" y1="-46" x2="22" y2="-38" stroke="#1A3580" stroke-width="3"/>
      <line x1="46" y1="-27" x2="38" y2="-22" stroke="#1A3580" stroke-width="3"/>
      <line x1="54" y1="0" x2="44" y2="0" stroke="#1A3580" stroke-width="3"/>
      <line x1="46" y1="27" x2="38" y2="22" stroke="#1A3580" stroke-width="3"/>
      <line x1="27" y1="46" x2="22" y2="38" stroke="#1A3580" stroke-width="3"/>
      <line x1="0" y1="54" x2="0" y2="44" stroke="#1A3580" stroke-width="3"/>
      <line x1="-27" y1="46" x2="-22" y2="38" stroke="#1A3580" stroke-width="3"/>
      <line x1="-46" y1="27" x2="-38" y2="22" stroke="#1A3580" stroke-width="3"/>
      <line x1="-54" y1="0" x2="-44" y2="0" stroke="#1A3580" stroke-width="3"/>
      <line x1="-46" y1="-27" x2="-38" y2="-22" stroke="#1A3580" stroke-width="3"/>
      <line x1="-27" y1="-46" x2="-22" y2="-38" stroke="#1A3580" stroke-width="3"/>
    </g>
    <!-- Seal main circle -->
    <circle cx="0" cy="0" r="42" fill="url(#sealG)"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Inner text arc top -->
    <path id="arcTop" d="M -28 -28 A 40 40 0 0 1 28 -28" fill="none"/>
    <text font-family="'Helvetica Neue',Arial,sans-serif" font-size="8.5" font-weight="600" fill="rgba(255,255,255,0.8)" letter-spacing="2">
      <textPath href="#arcTop">SITE MEISTER AI</textPath>
    </text>
    <!-- Center content -->
    <text x="0" y="-4" font-family="Georgia,serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">SM</text>
    <line x1="-16" y1="4" x2="16" y2="4" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="0" y="15" font-family="'Helvetica Neue',Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1.5">CERTIFIED</text>
    <!-- Gold star bottom of seal -->
    <polygon points="0,28 2,33 7,33 3,36 5,41 0,38 -5,41 -3,36 -7,33 -2,33" fill="#F59E0B" transform="scale(0.7)"/>
  </g>
  <text x="160" y="74" font-family="Georgia,serif" font-size="12" fill="#6B7280" letter-spacing="4">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <rect x="160" y="125" width="190" height="2.5" fill="url(#sealG)" rx="1.25"/>
  <text x="160" y="150" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">認定品質のAIホームページ制作サービス</text>
</svg>
