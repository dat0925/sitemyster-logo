<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Circuit board pattern -->
    <rect x="-48" y="-48" width="96" height="96" rx="6" fill="#F8FAFF"/>
    <rect x="-48" y="-48" width="96" height="96" rx="6" fill="none" stroke="#1A3580" stroke-width="2"/>
    <!-- Circuit traces -->
    <path d="M -30 -30 L -30 -10 L -10 -10" fill="none" stroke="#1A3580" stroke-width="2" stroke-linecap="round"/>
    <path d="M 30 -30 L 30 -10 L 10 -10" fill="none" stroke="#1A3580" stroke-width="2" stroke-linecap="round"/>
    <path d="M -30 30 L -30 10 L -10 10" fill="none" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
    <path d="M 30 30 L 30 10 L 10 10" fill="none" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
    <!-- Corner nodes -->
    <circle cx="-30" cy="-30" r="4" fill="#1A3580"/>
    <circle cx="30" cy="-30" r="4" fill="#1A3580"/>
    <circle cx="-30" cy="30" r="4" fill="#2B5CE6"/>
    <circle cx="30" cy="30" r="4" fill="#2B5CE6"/>
    <!-- Center chip -->
    <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#1A3580"/>
    <text x="0" y="5" font-family="'Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="900" fill="#60A5FA" text-anchor="middle">AI</text>
    <!-- Gold connection points on edges -->
    <rect x="-6" y="-52" width="12" height="6" rx="2" fill="#F59E0B"/>
    <rect x="-6" y="46" width="12" height="6" rx="2" fill="#F59E0B"/>
  </g>
  <text x="160" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6B7280" letter-spacing="3">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">AIが精密回路のように構築するホームページ</text>
</svg>
