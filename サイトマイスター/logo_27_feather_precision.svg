<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Feather quill shape -->
    <path d="M 0 36 Q -8 20 -4 0 Q 0 -20 -10 -40 Q 10 -52 30 -40 Q 50 -28 40 0 Q 30 20 20 36 Q 10 48 0 36 Z" fill="#1A3580"/>
    <!-- Feather vanes -->
    <path d="M 0 36 Q 5 20 12 4 Q 20 -12 30 -40" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="5" y1="20" x2="-8" y2="14" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="10" y1="8" x2="-6" y2="2" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="14" y1="-4" x2="-4" y2="-10" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="18" y1="-16" x2="2" y2="-22" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="22" y1="-28" x2="8" y2="-34" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Quill tip (pen nib) -->
    <path d="M 0 36 L -4 44 L 4 44 Z" fill="#F59E0B"/>
    <!-- Ink dot -->
    <circle cx="0" cy="46" r="3" fill="#F59E0B" opacity="0.6"/>
    <!-- Accent color on feather tip -->
    <path d="M 30 -40 Q 40 -28 34 -20" fill="none" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="160" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6B7280" letter-spacing="3">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">職人の筆で描くAIホームページ</text>
</svg>
