<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Origami crane / folded paper shape -->
    <polygon points="0,-50 40,10 0,30 -40,10" fill="#1A3580"/>
    <polygon points="0,-50 40,10 0,30" fill="#2B5CE6" opacity="0.8"/>
    <!-- Wing details -->
    <polygon points="0,30 -40,10 -20,46" fill="#60A5FA" opacity="0.6"/>
    <polygon points="0,30 40,10 20,46" fill="#60A5FA" opacity="0.4"/>
    <!-- Fold line highlights -->
    <line x1="0" y1="-50" x2="0" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="-40" y1="10" x2="40" y2="10" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <!-- Gold tip -->
    <circle cx="0" cy="-52" r="4" fill="#F59E0B"/>
  </g>
  <text x="160" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6B7280" letter-spacing="3">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">職人の折り紙のように精緻なHP設計</text>
</svg>
