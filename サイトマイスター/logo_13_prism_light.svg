<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,108)">
    <!-- Prism triangle -->
    <polygon points="0,-60 52,28 -52,28" fill="none" stroke="#1A3580" stroke-width="3"/>
    <!-- Refracted light rays out the right -->
    <line x1="52" y1="28" x2="76" y2="10" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="52" y1="28" x2="80" y2="22" stroke="#2B5CE6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="52" y1="28" x2="78" y2="36" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <!-- Input ray on left -->
    <line x1="-80" y1="-16" x2="-26" y2="-16" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="-80" y1="-16" x2="-52" y2="-16" stroke="#1A3580" stroke-width="3" stroke-linecap="round"/>
    <!-- Fill prism with gradient hint -->
    <polygon points="0,-60 52,28 -52,28" fill="url(#prismFill)" opacity="0.15"/>
    <defs>
      <linearGradient id="prismFill" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#60A5FA"/>
        <stop offset="100%" style="stop-color:#1A3580"/>
      </linearGradient>
    </defs>
    <!-- Center dot -->
    <circle cx="0" cy="-8" r="4" fill="#F59E0B"/>
  </g>
  <text x="160" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6B7280" letter-spacing="3">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">情報を受け取り、最適なHPへ変換する</text>
</svg>
