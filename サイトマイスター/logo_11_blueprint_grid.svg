<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Blueprint grid bg -->
    <rect x="-50" y="-50" width="100" height="100" rx="4" fill="#1A3580"/>
    <!-- Grid lines -->
    <line x1="-50" y1="-25" x2="50" y2="-25" stroke="rgba(96,165,250,0.3)" stroke-width="0.8"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="rgba(96,165,250,0.4)" stroke-width="0.8"/>
    <line x1="-50" y1="25" x2="50" y2="25" stroke="rgba(96,165,250,0.3)" stroke-width="0.8"/>
    <line x1="-25" y1="-50" x2="-25" y2="50" stroke="rgba(96,165,250,0.3)" stroke-width="0.8"/>
    <line x1="0" y1="-50" x2="0" y2="50" stroke="rgba(96,165,250,0.4)" stroke-width="0.8"/>
    <line x1="25" y1="-50" x2="25" y2="50" stroke="rgba(96,165,250,0.3)" stroke-width="0.8"/>
    <!-- Blueprint design (browser window) -->
    <rect x="-28" y="-32" width="56" height="40" rx="2" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
    <line x1="-28" y1="-24" x2="28" y2="-24" stroke="#60A5FA" stroke-width="1.5"/>
    <circle cx="-22" cy="-28" r="2" fill="#60A5FA"/>
    <circle cx="-16" cy="-28" r="2" fill="#2B5CE6"/>
    <!-- Gold crosshair in center -->
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#F59E0B"/>
  </g>
  <text x="160" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6B7280" letter-spacing="3">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">設計図から生まれる、精密なホームページ</text>
</svg>
