<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" fill="white"/>
  <g transform="translate(88,100)">
    <!-- Stylized typewriter key -->
    <rect x="-44" y="-36" width="88" height="60" rx="8" fill="#1A3580"/>
    <rect x="-38" y="-30" width="76" height="48" rx="6" fill="#0F1E4A"/>
    <!-- Key letter -->
    <text x="0" y="8" font-family="'Courier New',monospace" font-size="30" font-weight="700" fill="#60A5FA" text-anchor="middle">SM</text>
    <!-- Key shine -->
    <path d="M -38 -30 Q -20 -36 0 -30 L 0 -24 Q -20 -30 -38 -24 Z" fill="rgba(255,255,255,0.08)"/>
    <!-- Key shadow/base -->
    <rect x="-44" y="22" width="88" height="8" rx="4" fill="#0A1430"/>
    <!-- Typing cursor blink line -->
    <rect x="20" y="-4" width="3" height="20" rx="1.5" fill="#F59E0B"/>
  </g>
  <text x="160" y="74" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#6B7280" letter-spacing="3">SITE MEISTER</text>
  <text x="160" y="118" font-family="'Helvetica Neue',Arial,sans-serif" font-size="34" font-weight="800" fill="#1A3580">サイトマイスター</text>
  <text x="160" y="148" font-family="'Helvetica Neue',Arial,'Noto Sans JP',sans-serif" font-size="10" fill="#9CA3AF">AIが書き上げる、職人のホームページ</text>
</svg>
